<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Calificaciones</title>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <link rel="stylesheet" href="./assets/css/style.css">

    <!-- CORE -->
    <script src="./assets/js/core/variables.js"></script>
    <script src="./assets/js/fechas/fechas.js"></script>
    <script src="./assets/js/core/config.js"></script>
    <script src="./assets/js/core/database.js"></script>
    <script src="./assets/js/modules/ui.js"></script>
    <script src="./assets/js/views/sectionMenu.js"></script>

    <!-- MÓDULOS -->
    <script src="./assets/js/modules/students.js"></script>
    <script src="./assets/js/modules/grades.js"></script>
    <script src="./assets/js/views/plan.js"></script>
    <script src="./assets/js/views/sidebar.js"></script>
    <script src="./assets/js/views/workItems.js"></script>

    <!-- BASE -->
    <script src="./assets/js/constructor/baseApp.js"></script>

    <!-- MANAGERS -->
    <script src="./assets/js/constructor/StudentManager.js"></script>
    <script src="./assets/js/constructor/PlanManager.js"></script>
    <script src="./assets/js/constructor/FinalGradesManager.js"></script>
    <script src="./assets/js/constructor/MachoteManager.js"></script>
    <script src="./assets/js/constructor/RubrosManager.js"></script>
    <script src="./assets/js/constructor/WorkManager.js"></script>
    <script src="./assets/js/constructor/GroupModeManager.js"></script>
    <script src="./assets/js/constructor/QuickAddManager.js"></script>

    <!-- APP PRINCIPAL -->
    <script src="./assets/js/constructor/constructor.js"></script>

</head>

<body>
    <div class="app-container">
        <!-- Activity Bar -->
        <div class="activity-bar" id="activityBar">
            <div class="activity-item active" data-view="sections" title="Secciones">
                <i class="fas fa-layer-group"></i>
            </div>
            <div class="activity-item btn-add-rapido" id="btnAddRapido" title="Agregar rápido">
                <i class="fas fa-plus"></i>
            </div>
            <div class="activity-item" data-view="profesor" title="Profesor">
                <i class="fas fa-chalkboard-user"></i>
            </div>
            <div class="activity-item" data-view="horario" title="Horario">
                <i class="fas fa-calendar-alt"></i>
            </div>
            <div class="activity-item" data-view="evaluacion" title="Evaluación">
                <i class="fas fa-table-list"></i>
            </div>
            <div class="activity-item" data-view="links" title="Enlaces">
                <i class="fas fa-link"></i>
            </div>
            <div class="activity-item" data-view="ayuda" title="Ayuda">
                <i class="fas fa-question-circle"></i>
            </div>
            <div class="activity-item btn-tema" id="themeToggle" title="Cambiar tema">
                <i class="fas fa-palette"></i>
            </div>
        </div>

        <!-- Sidebar -->
        <div class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <span id="sidebarTitle">SECCIONES</span>
                <div class="header-actions">
                    <button class="btn-action-icon" id="addSectionBtn" title="Nueva Sección">
                        <i class="fas fa-plus"></i>
                    </button>
                </div>
            </div>
            <div class="section-select-container">
                <select id="sectionSelect">
                    <option value="">-- Seleccionar sección --</option>
                </select>
            </div>
            <div class="sidebar-content" id="sidebarContent">
                <div style="padding:20px; text-align:center; color:var(--text-secondary);">
                    <i class="fas fa-spinner fa-spin" style="font-size:24px;"></i>
                    <p style="margin-top:12px;">Cargando...</p>
                </div>
            </div>
        </div>

        <!-- Main Content -->
        <div class="main-content">
            <div class="section-header" id="sectionHeader">
                <div class="section-info">
                    <i class="fas fa-graduation-cap"></i>
                    <span id="currentSectionName">Sistema de Calificaciones</span>
                </div>
                <div class="header-actions"></div>
            </div>

            <div class="stats-bar" id="statsBar">
                <div class="stat"><i class="fas fa-users"></i> <span id="statEstudiantes">0</span> estudiantes</div>
                <div class="stat"><i class="fas fa-clipboard-list"></i> <span id="statCotidianos">0</span> cotidianos</div>
                <div class="stat"><i class="fas fa-tasks"></i> <span id="statTareas">0</span> tareas</div>
                <div class="stat"><i class="fas fa-chart-line"></i> <span id="statPorcentaje">0%</span> promedio</div>
            </div>

            <div class="content-pane" id="mainContent">
                <div style="display:flex; justify-content:center; align-items:center; height:100%; color:var(--text-secondary);">
                    <div style="text-align:center;">
                        <i class="fas fa-folder-open" style="font-size:48px; margin-bottom:16px; opacity:0.3;"></i>
                        <p style="font-size:16px;">Bienvenido al Sistema de Calificaciones</p>
                        <p style="font-size:13px; margin-top:8px; color:var(--text-muted);">Selecciona o crea una sección para comenzar</p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>

</html>
