 <script src="./assets/js/constructor/AsistenciaManager.js"></script>

<body>
    <div class="app-container">
        <!-- Activity Bar -->
        <div class="activity-bar" id="activityBar">
            <div class="activity-item active" data-view="sections" title="Secciones">
                <i class="fas fa-layer-group"></i>
            </div>
            <div class="activity-item btn-add-rapido" id="btnAddRapido" title="Agregar rápido">
                <i class="fas fa-plus"></i>
            </div>
            <div class="activity-item" data-view="profesor" title="Profesor">
                <i class="fas fa-chalkboard-user"></i>
            </div>
            <div class="activity-item" data-view="horario" title="Horario">
                <i class="fas fa-calendar-alt"></i>
            </div>
            <div class="activity-item" data-view="evaluacion" title="Evaluación">
                <i class="fas fa-table-list"></i>
            </div>
            <div class="activity-item" data-view="links" title="Enlaces">
                <i class="fas fa-link"></i>
            </div>
            <div class="activity-item" data-view="ayuda" title="Ayuda">
                <i class="fas fa-question-circle"></i>
            </div>
            <div class="activity-item btn-tema" id="themeToggle" title="Cambiar tema">
                <i class="fas fa-palette"></i>
            </div>
        </div>

        <!-- Sidebar -->
        <div class="sidebar" id="sidebar">
          <div class="sidebar-header">
            <div class="section-select-container">
    <select id="sectionSelect"  >
        <option value="">-- Seleccionar sección --</option>
    </select>
            </div>

    <button class="btn-action-icon" id="addSectionBtn" title="Nueva Sección">
        <i class="fas fa-plus"></i>
    </button>
</div>
         
            <div class="sidebar-content" id="sidebarContent">
                <div style="padding:20px; text-align:center; color:var(--text-secondary);">
                    <i class="fas fa-spinner fa-spin" style="font-size:24px;"></i>
                    <p style="margin-top:12px;">Cargando...</p>
                </div>
            </div>
        </div>

        <!-- Main Content -->
        <div class="main-content">
            <div class="section-header" id="sectionHeader">
                <div class="section-info" >
                    <i class="fas fa-graduation-cap"></i>
                    <span id="currentSectionName">Sistema de Calificaciones</span>

                    <span id="editarSeccionBtn" >
                        hola
                    </span>

                   

                </div>
                <div class="header-actions" ></div>
            </div>

            <div class="stats-bar" id="statsBar">
                <div class="stat"><i class="fas fa-users"></i> <span id="statEstudiantes">0</span> estudiantes</div>
                <div class="stat"><i class="fas fa-clipboard-list"></i> <span id="statCotidianos">0</span> cotidianos</div>
                <div class="stat"><i class="fas fa-tasks"></i> <span id="statTareas">0</span> tareas</div>
                <div class="stat"><i class="fas fa-chart-line"></i> <span id="statPorcentaje">0%</span> promedio</div>
            </div>

            <div class="content-pane" id="mainContent">
                <div style="display:flex; justify-content:center; align-items:center; height:100%; color:var(--text-secondary);">
                    <div style="text-align:center;">
                        <i class="fas fa-folder-open" style="font-size:48px; margin-bottom:16px; opacity:0.3;"></i>
                        <p style="font-size:16px;">Bienvenido al Sistema de Calificaciones</p>
                        <p style="font-size:13px; margin-top:8px; color:var(--text-muted);">Selecciona o crea una sección para comenzar</p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>

<!-- ============================================================ -->
<!-- SCRIPT DE DIAGNÓSTICO Y FALLBACK -->
<!-- ============================================================ -->
<script>
    (function() {
        console.log('🔍 Diagnóstico de RubrosManager...');
        
        // Verificar si la clase existe
        console.log('typeof RubrosManager:', typeof RubrosManager);
        
        // Verificar después de que la app se inicialice
        document.addEventListener('DOMContentLoaded', function() {
            setTimeout(() => {
                if (window.app) {
                    console.log('✅ window.app existe');
                    console.log('typeof window.app.addRubro:', typeof window.app.addRubro);
                    console.log('typeof window.app.editarRubro:', typeof window.app.editarRubro);
                    console.log('typeof window.app.deleteRubro:', typeof window.app.deleteRubro);
                    console.log('typeof window.app.importarRubros:', typeof window.app.importarRubros);
                    console.log('typeof window.app.renderRubros:', typeof window.app.renderRubros);
                    
                    // Si addRubro no es función, crearlo
                    if (typeof window.app.addRubro !== 'function') {
                        console.warn('⚠️ addRubro no es función, creando fallback...');
                        window.app.addRubro = async function() {
                            console.log('📊 addRubro desde fallback');
                            const rubros = this.grades.works['rubro'] || [];
                            const totalActual = rubros.reduce((sum, r) => sum + (r.porcentaje || 0), 0);
                            const restante = Math.max(0, 100 - totalActual);

                            const result = await Swal.fire({
                                title: 'Agregar Nuevo Rubro',
                                html: `
                                    <div style="display:flex; flex-direction:column; gap:8px; text-align:left;">
                                        <div style="padding:8px 12px; background:var(--bg-hover); border-radius:6px; margin-bottom:8px;">
                                            <span style="font-size:12px; color:var(--text-secondary);">
                                                📊 Porcentaje disponible: <strong style="color:#f9e2af;">${restante}%</strong>
                                            </span>
                                        </div>
                                        <label style="font-size:13px; color:var(--text-secondary);">📝 Nombre:</label>
                                        <input id="swal-nombre" class="swal2-input" placeholder="Nombre del rubro">
                                        <label style="font-size:13px; color:var(--text-secondary);">📊 Porcentaje (%):</label>
                                        <input id="swal-porcentaje" class="swal2-input" type="number" min="0" max="${restante}" value="${Math.min(25, restante)}">
                                    </div>`,
                                showCancelButton: true,
                                confirmButtonText: '✅ Agregar Rubro',
                                cancelButtonText: '❌ Cancelar',
                                background: 'var(--bg-card)',
                                color: 'var(--text-primary)',
                                width: '480px',
                                preConfirm: () => {
                                    const nombre = document.getElementById('swal-nombre').value.trim();
                                    const porcentaje = parseFloat(document.getElementById('swal-porcentaje').value);
                                    if (!nombre) {
                                        Swal.showValidationMessage('El nombre es obligatorio');
                                        return;
                                    }
                                    if (isNaN(porcentaje) || porcentaje < 0 || porcentaje > 100) {
                                        Swal.showValidationMessage('El porcentaje debe ser entre 0 y 100');
                                        return;
                                    }
                                    if (porcentaje > restante) {
                                        Swal.showValidationMessage(`El porcentaje no puede exceder el ${restante}% disponible`);
                                        return;
                                    }
                                    return { nombre, porcentaje };
                                }
                            });

                            if (result.isConfirmed && result.value) {
                                await this.grades.addWork(this.currentSectionId, 'rubro', {
                                    nombre: result.value.nombre,
                                    porcentaje: result.value.porcentaje,
                                    fecha: getDayMonth(),
                                    activo: true
                                });
                                await this.render();
                                this.ui.showSuccess(`✅ Rubro "${result.value.nombre}" creado con ${result.value.porcentaje}%`);
                            }
                        };
                        console.log('✅ addRubro creado como fallback');
                    }
                    
                    // Si editarRubro no es función, crearlo
                    if (typeof window.app.editarRubro !== 'function') {
                        window.app.editarRubro = async function(id) {
                            console.log('📊 editarRubro desde fallback para id:', id);
                            const rubro = this.grades.getWorkById('rubro', id);
                            if (!rubro) {
                                this.ui.showError('Rubro no encontrado');
                                return;
                            }
                            // Mostrar mensaje de que la edición no está disponible
                            this.ui.showInfo('La edición de rubros está en desarrollo. Por favor, usa la consola para más información.');
                        };
                    }
                    
                    // Si deleteRubro no es función, crearlo
                    if (typeof window.app.deleteRubro !== 'function') {
                        window.app.deleteRubro = async function(id) {
                            console.log('📊 deleteRubro desde fallback para id:', id);
                            const rubro = this.grades.getWorkById('rubro', id);
                            if (!rubro) {
                                this.ui.showError('Rubro no encontrado');
                                return;
                            }
                            const confirm = await this.ui.showConfirm(`¿Eliminar el rubro "${rubro.nombre}" (${rubro.porcentaje}%)?`);
                            if (confirm.isConfirmed) {
                                await this.grades.deleteWork('rubro', id);
                                await this.render();
                                this.ui.showSuccess('Rubro eliminado');
                            }
                        };
                    }
                    
                    // Si importarRubros no es función, crearlo
                    if (typeof window.app.importarRubros !== 'function') {
                        window.app.importarRubros = async function() {
                            this.ui.showInfo('La importación de rubros está en desarrollo.');
                        };
                    }
                    
                    console.log('✅ Métodos de rubros verificados y corregidos');
                } else {
                    console.warn('⚠️ window.app no está disponible después de 2 segundos');
                }
            }, 2000);
        });
    })();

    // Verificar que los métodos existen
console.log('typeof window.app.editarRubro:', typeof window.app?.editarRubro);

// Verificar que rubrosManager existe
console.log('window.app.rubrosManager:', window.app?.rubrosManager);

// Verificar que RubrosManager está definido
console.log('typeof RubrosManager:', typeof RubrosManager);

// Probar editar un rubro manualmente (reemplaza 1 con un ID real)
// window.app.editarRubro(1);
</script>
</html>
