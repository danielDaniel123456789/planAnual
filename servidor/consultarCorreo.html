<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Consultar respaldo - VS Code style</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />

    <style>
        /* ===== RESET Y ESTRUCTURA VS CODE ===== */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #1e1e2f;
            color: #cdd6f4;
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }
        /* Barra de título superior */
        .title-bar {
            background: #252535;
            padding: 6px 16px;
            display: flex;
            align-items: center;
            gap: 12px;
            border-bottom: 1px solid #3a3a4a;
            flex-shrink: 0;
        }
        .title-bar h1 {
            font-size: 16px;
            font-weight: 400;
            display: flex;
            align-items: center;
            gap: 8px;
            color: #f9e2af;
        }
        .title-bar h1 i {
            color: #89b4fa;
        }
        .title-bar .spacer {
            flex: 1;
        }
        .title-bar .email-form {
            display: flex;
            gap: 6px;
            align-items: center;
            background: #3a3a4a;
            padding: 4px 12px;
            border-radius: 20px;
        }
        .title-bar .email-form input {
            background: transparent;
            border: none;
            color: #cdd6f4;
            font-size: 13px;
            padding: 4px 0;
            min-width: 180px;
            outline: none;
        }
        .title-bar .email-form input::placeholder {
            color: #6c7086;
        }
        .title-bar .email-form button {
            background: #89b4fa;
            border: none;
            padding: 2px 14px;
            border-radius: 20px;
            font-weight: 600;
            color: #1e1e2f;
            cursor: pointer;
            font-size: 13px;
            display: flex;
            align-items: center;
            gap: 4px;
            transition: background 0.2s;
        }
        .title-bar .email-form button:hover {
            background: #b4cffa;
        }
        .title-bar .email-form button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        .btn-tema {
            background: rgba(255, 255, 255, 0.05);
            border: 2px solid rgba(137, 180, 250, 0.3);
            border-radius: 50%;
            width: 34px;
            height: 34px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #89b4fa;
            cursor: pointer;
            transition: all 0.3s;
            flex-shrink: 0;
        }
        .btn-tema:hover {
            transform: scale(1.05);
            border-color: #89b4fa;
            box-shadow: 0 0 20px rgba(137, 180, 250, 0.3);
        }
        /* Estado subiendo (gradiente vertical rojo) */
        .btn-tema.subiendo {
            border-radius: 30px !important;
            width: auto !important;
            height: auto !important;
            padding: 4px 14px !important;
            background: linear-gradient(180deg, #ff0040, #ff6b00, #ffcc00) !important;
            background-size: 100% 300% !important;
            animation: gradient-vertical 2s ease infinite, pulse-subida 1.2s ease-in-out infinite;
            border: 2px solid #fff !important;
            box-shadow: 0 0 40px rgba(255, 0, 64, 0.7), 0 0 80px rgba(255, 107, 0, 0.4) !important;
            color: #1e1e2f !important;
            font-weight: 700;
            font-size: 0.8rem;
            gap: 6px;
        }
        .btn-tema.subiendo i {
            animation: spin 1.2s linear infinite !important;
        }
        .btn-tema.subiendo::after {
            content: "Subiendo";
            font-size: 0.7rem;
            font-weight: 600;
            color: #1e1e2f;
            margin-left: 4px;
        }
        @keyframes gradient-vertical {
            0% { background-position: 0% 0%; }
            50% { background-position: 0% 100%; }
            100% { background-position: 0% 0%; }
        }
        @keyframes pulse-subida {
            0% { box-shadow: 0 0 20px rgba(255, 0, 64, 0.4), 0 0 40px rgba(255, 107, 0, 0.2); }
            50% { box-shadow: 0 0 50px rgba(255, 0, 64, 0.9), 0 0 100px rgba(255, 107, 0, 0.6); }
            100% { box-shadow: 0 0 20px rgba(255, 0, 64, 0.4), 0 0 40px rgba(255, 107, 0, 0.2); }
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* ===== CUERPO PRINCIPAL (VS CODE LAYOUT) ===== */
        .main-body {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        /* SIDEBAR IZQUIERDA (Explorador) */
        .sidebar-explorer {
            width: 260px;
            background: #252535;
            border-right: 1px solid #3a3a4a;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            flex-shrink: 0;
        }
        .sidebar-explorer .header {
            padding: 8px 12px;
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            color: #6c7086;
            border-bottom: 1px solid #3a3a4a;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .sidebar-explorer .header .badge {
            background: #3a3a4a;
            padding: 1px 10px;
            border-radius: 12px;
            font-size: 10px;
            color: #a6adc8;
        }
        .sidebar-explorer .tree {
            flex: 1;
            overflow-y: auto;
            padding: 4px 0;
        }
        .sidebar-explorer .tree .tree-item {
            cursor: pointer;
            padding: 4px 12px;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 13px;
            color: #cdd6f4;
            border-left: 2px solid transparent;
            transition: background 0.15s;
        }
        .sidebar-explorer .tree .tree-item:hover {
            background: #3a3a4a;
        }
        .sidebar-explorer .tree .tree-item.active {
            background: #3a3a4a;
            border-left-color: #89b4fa;
        }
        .sidebar-explorer .tree .tree-item .icon {
            width: 18px;
            text-align: center;
            color: #f9e2af;
        }
        .sidebar-explorer .tree .tree-item .chevron {
            margin-left: auto;
            color: #6c7086;
            transition: transform 0.2s;
            font-size: 12px;
        }
        .sidebar-explorer .tree .tree-item .chevron.open {
            transform: rotate(90deg);
        }
        .sidebar-explorer .tree .tree-item .count {
            font-size: 11px;
            color: #6c7086;
            margin-left: 4px;
        }
        .sidebar-explorer .tree .tree-children {
            padding-left: 24px;
            display: none;
        }
        .sidebar-explorer .tree .tree-children.open {
            display: block;
        }
        .sidebar-explorer .tree .tree-children .tree-item {
            font-size: 12px;
            padding: 3px 12px;
        }

        /* PANEL PRINCIPAL (contenido y pestañas) */
        .panel-principal {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            background: #1e1e2f;
        }
        /* Pestañas */
        .tabs-bar {
            display: flex;
            background: #252535;
            border-bottom: 1px solid #3a3a4a;
            padding: 0 8px;
            overflow-x: auto;
            flex-shrink: 0;
            min-height: 36px;
        }
        .tabs-bar .tab {
            padding: 6px 16px;
            font-size: 12px;
            color: #a6adc8;
            cursor: pointer;
            border-bottom: 2px solid transparent;
            white-space: nowrap;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: all 0.15s;
        }
        .tabs-bar .tab:hover {
            color: #cdd6f4;
        }
        .tabs-bar .tab.active {
            color: #cdd6f4;
            border-bottom-color: #89b4fa;
            background: #2a2a3a;
        }
        .tabs-bar .tab .close-tab {
            margin-left: 4px;
            color: #6c7086;
            font-size: 10px;
            cursor: pointer;
        }
        .tabs-bar .tab .close-tab:hover {
            color: #f38ba8;
        }

        /* Contenido de pestañas (scroll) */
        .tab-content {
            flex: 1;
            overflow-y: auto;
            padding: 12px 16px;
        }
        .tab-content .data-view {
            display: none;
        }
        .tab-content .data-view.active {
            display: block;
        }

        /* ===== TABLAS ===== */
        .table-container {
            margin-bottom: 20px;
        }
        .table-container h3 {
            font-size: 14px;
            color: #89b4fa;
            margin-bottom: 6px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .table-container h3 .count {
            font-weight: 400;
            color: #a6adc8;
            font-size: 12px;
        }
        .table-container table {
            width: 100%;
            border-collapse: collapse;
            font-size: 12px;
            background: #2a2a3a;
            border-radius: 4px;
            overflow: hidden;
        }
        .table-container th {
            text-align: left;
            padding: 6px 10px;
            background: #3a3a4a;
            color: #a6adc8;
            font-weight: 600;
            cursor: pointer;
            user-select: none;
            white-space: nowrap;
        }
        .table-container th:hover {
            background: #4a4a5a;
        }
        .table-container th .sort-icon {
            margin-left: 4px;
            font-size: 10px;
            color: #6c7086;
        }
        .table-container td {
            padding: 4px 10px;
            border-bottom: 1px solid #3a3a4a;
            vertical-align: top;
            word-break: break-word;
        }
        .table-container tr:hover td {
            background: rgba(137, 180, 250, 0.05);
        }
        .table-container .empty-row {
            color: #6c7086;
            font-style: italic;
            text-align: center;
            padding: 16px;
        }

        /* ===== BUSCADOR ===== */
        .search-box {
            padding: 6px 16px;
            background: #252535;
            border-bottom: 1px solid #3a3a4a;
            display: flex;
            gap: 8px;
            align-items: center;
            flex-shrink: 0;
        }
        .search-box input {
            flex: 1;
            background: #3a3a4a;
            border: none;
            padding: 4px 12px;
            border-radius: 12px;
            color: #cdd6f4;
            font-size: 13px;
            outline: none;
        }
        .search-box input::placeholder {
            color: #6c7086;
        }
        .search-box .result-count {
            font-size: 12px;
            color: #a6adc8;
            white-space: nowrap;
        }

        /* ===== SCROLLBAR ===== */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #1e1e2f;
        }
        ::-webkit-scrollbar-thumb {
            background: #45475a;
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #585b70;
        }

        /* ===== ESTADO VACÍO ===== */
        .empty-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            color: #6c7086;
        }
        .empty-state i {
            font-size: 48px;
            margin-bottom: 16px;
            opacity: 0.3;
        }
        .empty-state p {
            font-size: 14px;
        }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 700px) {
            .sidebar-explorer {
                width: 200px;
            }
            .title-bar .email-form input {
                min-width: 100px;
            }
        }
        @media (max-width: 550px) {
            .main-body {
                flex-direction: column;
            }
            .sidebar-explorer {
                width: 100%;
                max-height: 200px;
                border-right: none;
                border-bottom: 1px solid #3a3a4a;
            }
            .title-bar {
                flex-wrap: wrap;
            }
            .title-bar .email-form {
                flex: 1;
                min-width: 200px;
            }
        }
    </style>
</head>

<body>

    <!-- BARRA DE TÍTULO -->
    <div class="title-bar">
        <h1><i class="fas fa-cloud-download-alt"></i> Respaldo Viewer</h1>
        <div class="spacer"></div>
        <form class="email-form" id="emailForm" onsubmit="consultar(event)">
            <input type="email" id="emailInput" placeholder="correo@ejemplo.com" value="test@ejemplo.com" required />
            <button type="submit" id="btnConsultar">
                <i class="fas fa-search"></i> Consultar
            </button>
        </form>
        <div class="btn-tema" id="themeToggle" title="Cambiar tema">
            <i class="fas fa-palette"></i>
        </div>
    </div>

    <!-- CUERPO PRINCIPAL -->
    <div class="main-body">

        <!-- SIDEBAR EXPLORADOR -->
        <div class="sidebar-explorer" id="sidebar">
            <div class="header">
                <span>SECCIONES</span>
                <span class="badge" id="sectionCount">0</span>
            </div>
            <div class="tree" id="treeContainer">
                <div style="padding:20px; text-align:center; color:#6c7086; font-size:13px;">
                    <i class="fas fa-spinner fa-pulse"></i> Cargando...
                </div>
            </div>
        </div>

        <!-- PANEL PRINCIPAL -->
        <div class="panel-principal">
            <!-- Pestañas -->
            <div class="tabs-bar" id="tabsBar">
                <div class="tab active" data-tab="welcome">
                    <i class="fas fa-home"></i> Inicio
                </div>
            </div>

            <!-- Buscador -->
            <div class="search-box" id="searchBox" style="display:none;">
                <i class="fas fa-search" style="color:#6c7086;"></i>
                <input type="text" id="globalSearch" placeholder="Buscar en todas las tablas..." oninput="aplicarBusquedaGlobal()" />
                <span class="result-count" id="globalCount">0 coincidencias</span>
            </div>

            <!-- Contenido de pestañas -->
            <div class="tab-content" id="tabContent">
                <div class="data-view active" id="view-welcome">
                    <div class="empty-state">
                        <i class="fas fa-cloud-download-alt"></i>
                        <p>Ingresa un correo y haz clic en <strong>Consultar</strong></p>
                        <p style="font-size:13px; color:#6c7086;">Los datos se organizarán en pestañas por sección</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // ============================================================
        // CONFIGURACIÓN
        // ============================================================
        const API_KEY = 'miClaveSuperSecreta123';
        const BASE_URL = 'https://educr.app/databaseJSON/';
        const DOWNLOAD_URL = BASE_URL + 'descargarJSON.php';

        // ============================================================
        // DOM
        // ============================================================
        const emailInput = document.getElementById('emailInput');
        const btnConsultar = document.getElementById('btnConsultar');
        const themeBtn = document.getElementById('themeToggle');
        const treeContainer = document.getElementById('treeContainer');
        const tabsBar = document.getElementById('tabsBar');
        const tabContent = document.getElementById('tabContent');
        const searchBox = document.getElementById('searchBox');
        const globalSearch = document.getElementById('globalSearch');
        const globalCount = document.getElementById('globalCount');
        const sectionCount = document.getElementById('sectionCount');

        let rawData = null;
        let sections = {};
        let sectionIds = [];
        let activeTab = 'welcome';
        let sortState = {}; // { tableId: { column: 'nombre', asc: true } }

        // ============================================================
        // CONSULTAR
        // ============================================================
        async function consultar(e) {
            e.preventDefault();
            const correo = emailInput.value.trim();
            if (!correo || !correo.includes('@')) {
                alert('Correo inválido');
                return;
            }

            btnConsultar.disabled = true;
            btnConsultar.innerHTML = '<i class="fas fa-spinner fa-pulse"></i>';

            // Efecto visual en botón de tema
            if (themeBtn) {
                window._themeOriginal = themeBtn.innerHTML;
                themeBtn.innerHTML = '<i class="fas fa-spinner"></i>';
                themeBtn.classList.add('subiendo');
            }

            try {
                const url = `${DOWNLOAD_URL}?api_key=${API_KEY}&correo=${encodeURIComponent(correo)}`;
                const resp = await fetch(url);
                if (resp.status === 404) throw new Error('No se encontró respaldo.');
                if (!resp.ok) {
                    const txt = await resp.text();
                    throw new Error(`Error ${resp.status}: ${txt}`);
                }
                const jsonText = await resp.text();
                let parsed;
                try { parsed = JSON.parse(jsonText); } catch { throw new Error('JSON inválido'); }
                rawData = parsed;
                procesarDatos(rawData, correo);
            } catch (err) {
                alert('Error: ' + err.message);
                console.error(err);
            } finally {
                btnConsultar.disabled = false;
                btnConsultar.innerHTML = '<i class="fas fa-search"></i> Consultar';
                if (themeBtn && window._themeOriginal) {
                    themeBtn.innerHTML = window._themeOriginal;
                    themeBtn.classList.remove('subiendo');
                    delete window._themeOriginal;
                }
            }
        }

        // ============================================================
        // PROCESAR DATOS (igual que antes)
        // ============================================================
        function procesarDatos(data, correo) {
            const secciones = data.secciones || [];
            if (secciones.length === 0) {
                treeContainer.innerHTML = `<div style="padding:20px; color:#6c7086;">No hay secciones</div>`;
                return;
            }

            sections = {};
            for (const sec of secciones) {
                const id = sec.id;
                sections[id] = {
                    nombre: sec.nombre || 'Sin nombre',
                    estudiantes: [],
                    trabajos: { cotidiano: [], tarea: [], examen: [], proyecto: [], rubro: [] },
                    calificaciones: [],
                    asistencia: [],
                    bitacora: [],
                    plan: { enlaces: [], contenido: [] },
                    porcentajes: null
                };
            }

            // Poblar estudiantes
            const estudiantes = data.estudiantes || [];
            for (const est of estudiantes) {
                const sid = est.seccionId;
                if (sections[sid]) sections[sid].estudiantes.push(est);
            }

            // Trabajos
            const storeMap = {
                cotidiano: 'trabajos_cotidiano',
                tarea: 'trabajos_tarea',
                examen: 'examenes',
                proyecto: 'proyectos',
                rubro: 'trabajos_rubro'
            };
            for (const tipo of ['cotidiano','tarea','examen','proyecto','rubro']) {
                const items = data[storeMap[tipo]] || [];
                for (const item of items) {
                    const sid = item.seccionId;
                    if (sections[sid]) sections[sid].trabajos[tipo].push(item);
                }
            }

            // Calificaciones
            const califs = data.calificaciones || [];
            for (const c of califs) {
                const est = estudiantes.find(e => e.id === c.estudianteId);
                if (est && sections[est.seccionId]) {
                    sections[est.seccionId].calificaciones.push(c);
                }
            }

            // Asistencia
            const asis = data.asistencia || [];
            for (const a of asis) {
                if (sections[a.seccionId]) sections[a.seccionId].asistencia.push(a);
            }

            // Bitácora
            const bits = data.bitacora || [];
            for (const b of bits) {
                if (sections[b.seccionId]) sections[b.seccionId].bitacora.push(b);
            }

            // Plan
            const enlaces = data.plan_enlaces || [];
            for (const e of enlaces) {
                if (sections[e.seccionId]) sections[e.seccionId].plan.enlaces.push(e);
            }
            const conts = data.plan_contenido || [];
            for (const c of conts) {
                if (sections[c.seccionId]) sections[c.seccionId].plan.contenido.push(c);
            }

            // Porcentajes
            const pcts = data.porcentajes || [];
            for (const p of pcts) {
                if (sections[p.seccionId]) sections[p.seccionId].porcentajes = p.porcentajes;
            }

            sectionIds = Object.keys(sections);
            sectionCount.textContent = sectionIds.length;

            renderTree();
            // Abrir primera sección automáticamente
            if (sectionIds.length > 0) {
                abrirSeccion(sectionIds[0]);
            }
            searchBox.style.display = 'flex';
        }

        // ============================================================
        // RENDER ÁRBOL (SIDEBAR)
        // ============================================================
        function renderTree() {
            let html = '';
            for (const id of sectionIds) {
                const sec = sections[id];
                const total = sec.estudiantes.length + Object.values(sec.trabajos).reduce((a,b) => a+b.length, 0) +
                             sec.calificaciones.length + sec.asistencia.length + sec.bitacora.length +
                             sec.plan.enlaces.length + sec.plan.contenido.length;
                html += `
                    <div class="tree-item" data-section-id="${id}" onclick="abrirSeccion('${id}')">
                        <span class="icon"><i class="fas fa-folder"></i></span>
                        ${escapeHtml(sec.nombre)}
                        <span class="count">(${total})</span>
                        <span class="chevron"><i class="fas fa-chevron-right"></i></span>
                    </div>
                `;
            }
            treeContainer.innerHTML = html;
        }

        // ============================================================
        // ABRIR SECCIÓN (crea pestaña)
        // ============================================================
        function abrirSeccion(sectionId) {
            // Si ya existe una pestaña con esa sección, activarla
            const existingTab = document.querySelector(`.tab[data-section="${sectionId}"]`);
            if (existingTab) {
                activarPestana(existingTab.dataset.tabId);
                return;
            }

            const sec = sections[sectionId];
            if (!sec) return;

            // Crear ID único para la pestaña
            const tabId = 'sec_' + sectionId;

            // Crear pestaña
            const tab = document.createElement('div');
            tab.className = 'tab';
            tab.dataset.section = sectionId;
            tab.dataset.tabId = tabId;
            tab.innerHTML = `
                <i class="fas fa-folder"></i> ${escapeHtml(sec.nombre)}
                <span class="close-tab" onclick="event.stopPropagation(); cerrarPestana('${tabId}')">&times;</span>
            `;
            tab.onclick = () => activarPestana(tabId);
            tabsBar.appendChild(tab);

            // Crear contenido
            const view = document.createElement('div');
            view.className = 'data-view';
            view.id = 'view-' + tabId;
            view.innerHTML = generarContenidoSeccion(sectionId);
            tabContent.appendChild(view);

            // Activar
            activarPestana(tabId);
            // Aplicar búsqueda global si hay texto
            if (globalSearch.value.trim()) {
                aplicarBusquedaGlobal();
            }
        }

        // ============================================================
        // GENERAR CONTENIDO DE SECCIÓN (tablas ordenables)
        // ============================================================
        function generarContenidoSeccion(sectionId) {
            const sec = sections[sectionId];
            let html = '';

            // Tabla: Estudiantes
            html += generarTabla('Estudiantes', sec.estudiantes, ['id','nombre','apellidos','cedula','correo'], 'estudiantes_' + sectionId);

            // Trabajos por tipo
            const tipos = [
                { key: 'cotidiano', label: 'Trabajos Cotidianos' },
                { key: 'tarea', label: 'Tareas' },
                { key: 'examen', label: 'Exámenes' },
                { key: 'proyecto', label: 'Proyectos' },
                { key: 'rubro', label: 'Rubros' }
            ];
            for (const t of tipos) {
                const items = sec.trabajos[t.key] || [];
                const cols = ['id','nombre','fecha','puntosMax','activo'];
                if (t.key === 'rubro') cols.push('porcentaje');
                html += generarTabla(t.label, items, cols, t.key + '_' + sectionId);
            }

            // Calificaciones
            html += generarTabla('Calificaciones', sec.calificaciones, ['estudianteId','trabajoId','tipoTrabajo','nota'], 'califs_' + sectionId);

            // Asistencia
            html += generarTabla('Asistencia', sec.asistencia, ['fecha','estudianteId','estado','lecciones'], 'asis_' + sectionId);

            // Bitácora
            html += generarTabla('Bitácora', sec.bitacora, ['id','titulo','contenido','fecha','timestamp'], 'bit_' + sectionId);

            // Plan enlaces
            html += generarTabla('Plan - Enlaces', sec.plan.enlaces, ['id','nombre','url','tipo'], 'plan_enl_' + sectionId);

            // Plan contenido
            html += generarTabla('Plan - Contenido', sec.plan.contenido, ['id','titulo','contenido','periodo','fecha'], 'plan_cont_' + sectionId);

            // Porcentajes
            if (sec.porcentajes) {
                html += generarPorcentajes(sec.porcentajes);
            }

            return html;
        }

        // ============================================================
        // GENERAR TABLA CON ORDENAMIENTO
        // ============================================================
        function generarTabla(titulo, items, columnas, tableId) {
            if (!items || items.length === 0) return '';

            // Inicializar estado de orden para esta tabla si no existe
            if (!sortState[tableId]) {
                sortState[tableId] = { column: columnas[0] || 'id', asc: true };
            }

            // Ordenar items según estado
            const sorted = ordenarItems(items, columnas, sortState[tableId]);

            let html = `<div class="table-container" data-table="${tableId}">
                <h3>${titulo} <span class="count">(${items.length})</span></h3>
                <table>
                    <thead><tr>
                        <th>#</th>`;
            for (const col of columnas) {
                const isSorted = sortState[tableId].column === col;
                const icon = isSorted ? (sortState[tableId].asc ? '↑' : '↓') : '↕';
                html += `<th onclick="ordenarTabla('${tableId}','${col}')">
                            ${col} <span class="sort-icon">${icon}</span>
                        </th>`;
            }
            html += `</tr></thead><tbody>`;

            for (let i = 0; i < sorted.length; i++) {
                const item = sorted[i];
                html += `<tr>`;
                html += `<td>${i+1}</td>`;
                for (const col of columnas) {
                    let val = item[col];
                    if (val === null || val === undefined) val = '';
                    if (typeof val === 'object') val = JSON.stringify(val);
                    const display = String(val).length > 40 ? String(val).substring(0, 40) + '…' : String(val);
                    html += `<td>${escapeHtml(display)}</td>`;
                }
                html += `</tr>`;
            }
            html += `</tbody></table></div>`;
            return html;
        }

        // ============================================================
        // ORDENAR ITEMS
        // ============================================================
        function ordenarItems(items, columnas, state) {
            const { column, asc } = state;
            const sorted = [...items];
            sorted.sort((a, b) => {
                let va = a[column];
                let vb = b[column];
                if (va === null || va === undefined) va = '';
                if (vb === null || vb === undefined) vb = '';
                if (typeof va === 'string') va = va.toLowerCase();
                if (typeof vb === 'string') vb = vb.toLowerCase();
                if (va < vb) return asc ? -1 : 1;
                if (va > vb) return asc ? 1 : -1;
                return 0;
            });
            return sorted;
        }

        // ============================================================
        // ORDENAR TABLA (click en cabecera)
        // ============================================================
        function ordenarTabla(tableId, column) {
            const state = sortState[tableId];
            if (state.column === column) {
                state.asc = !state.asc;
            } else {
                state.column = column;
                state.asc = true;
            }
            // Reconstruir solo la tabla afectada
            const container = document.querySelector(`.table-container[data-table="${tableId}"]`);
            if (!container) return;
            // Buscar el sectionId a partir del id de la tabla
            const sectionId = tableId.split('_').pop();
            const sec = sections[sectionId];
            if (!sec) return;

            // Determinar qué tipo de datos es
            let items = [];
            let titulo = '';
            let columnas = [];
            const prefix = tableId.split('_')[0];
            if (prefix === 'estudiantes') { items = sec.estudiantes; titulo = 'Estudiantes'; columnas = ['id','nombre','apellidos','cedula','correo']; }
            else if (prefix === 'cotidiano') { items = sec.trabajos.cotidiano; titulo = 'Trabajos Cotidianos'; columnas = ['id','nombre','fecha','puntosMax','activo']; }
            else if (prefix === 'tarea') { items = sec.trabajos.tarea; titulo = 'Tareas'; columnas = ['id','nombre','fecha','puntosMax','activo']; }
            else if (prefix === 'examen') { items = sec.trabajos.examen; titulo = 'Exámenes'; columnas = ['id','nombre','fecha','puntosMax','activo']; }
            else if (prefix === 'proyecto') { items = sec.trabajos.proyecto; titulo = 'Proyectos'; columnas = ['id','nombre','fecha','puntosMax','activo']; }
            else if (prefix === 'rubro') { items = sec.trabajos.rubro; titulo = 'Rubros'; columnas = ['id','nombre','fecha','puntosMax','activo','porcentaje']; }
            else if (prefix === 'califs') { items = sec.calificaciones; titulo = 'Calificaciones'; columnas = ['estudianteId','trabajoId','tipoTrabajo','nota']; }
            else if (prefix === 'asis') { items = sec.asistencia; titulo = 'Asistencia'; columnas = ['fecha','estudianteId','estado','lecciones']; }
            else if (prefix === 'bit') { items = sec.bitacora; titulo = 'Bitácora'; columnas = ['id','titulo','contenido','fecha','timestamp']; }
            else if (prefix === 'plan_enl') { items = sec.plan.enlaces; titulo = 'Plan - Enlaces'; columnas = ['id','nombre','url','tipo']; }
            else if (prefix === 'plan_cont') { items = sec.plan.contenido; titulo = 'Plan - Contenido'; columnas = ['id','titulo','contenido','periodo','fecha']; }
            else return;

            // Reconstruir solo esta tabla
            const newHtml = generarTabla(titulo, items, columnas, tableId);
            container.outerHTML = newHtml;
            // Reaplicar búsqueda si hay texto
            if (globalSearch.value.trim()) {
                aplicarBusquedaGlobal();
            }
        }

        // ============================================================
        // PORCENTAJES
        // ============================================================
        function generarPorcentajes(pct) {
            let html = `
                <div class="table-container">
                    <h3>Porcentajes</h3>
                    <table>
                        <thead><tr><th>Tipo</th><th>Porcentaje</th><th>Activo</th></tr></thead>
                        <tbody>
            `;
            for (const [tipo, conf] of Object.entries(pct)) {
                html += `<tr><td>${escapeHtml(tipo)}</td><td>${conf.porcentaje || 0}%</td><td>${conf.activo ? '✅' : '❌'}</td></tr>`;
            }
            html += `</tbody></table></div>`;
            return html;
        }

        // ============================================================
        // PESTAÑAS
        // ============================================================
        function activarPestana(tabId) {
            // Desactivar todas
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.data-view').forEach(v => v.classList.remove('active'));

            // Activar la seleccionada
            const tab = document.querySelector(`.tab[data-tab-id="${tabId}"]`);
            if (tab) tab.classList.add('active');
            const view = document.getElementById('view-' + tabId);
            if (view) view.classList.add('active');
            activeTab = tabId;
        }

        function cerrarPestana(tabId) {
            if (tabId === 'welcome') return;
            const tab = document.querySelector(`.tab[data-tab-id="${tabId}"]`);
            const view = document.getElementById('view-' + tabId);
            if (tab) tab.remove();
            if (view) view.remove();
            // Si la pestaña activa era esta, activar otra
            if (activeTab === tabId) {
                const firstTab = document.querySelector('.tab:not(.tab[data-tab-id="welcome"])');
                if (firstTab) {
                    activarPestana(firstTab.dataset.tabId);
                } else {
                    activarPestana('welcome');
                }
            }
        }

        // ============================================================
        // BÚSQUEDA GLOBAL (filtra filas en todas las tablas visibles)
        // ============================================================
        function aplicarBusquedaGlobal() {
            const term = globalSearch.value.trim().toLowerCase();
            const tables = document.querySelectorAll('.data-view.active .table-container table tbody tr');
            let totalVisible = 0;
            for (const row of tables) {
                const text = row.textContent.toLowerCase();
                const match = term === '' || text.includes(term);
                row.style.display = match ? '' : 'none';
                if (match) totalVisible++;
            }
            globalCount.textContent = `${totalVisible} coincidencias`;
        }

        // ============================================================
        // UTILIDADES
        // ============================================================
        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // ============================================================
        // TEMA (CLARO/OSCURO)
        // ============================================================
        themeBtn.addEventListener('click', function() {
            document.body.classList.toggle('light');
        });

        // ============================================================
        // ENTER para consultar
        // ============================================================
        emailInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') consultar(e);
        });

        console.log('✅ consultar_vscode.html cargado');
    </script>
</body>
